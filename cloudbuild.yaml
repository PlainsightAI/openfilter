steps:
  - name: 'python:3.12-slim'  # single version; full matrix in .github/workflows/ci.yaml
    id: install
    entrypoint: bash
    args:
      - -c
      - pip install -e .[all,dev]

  - name: 'python:3.12-slim'
    id: test
    entrypoint: bash
    args:
      - -c
      - make test-all

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 600s
