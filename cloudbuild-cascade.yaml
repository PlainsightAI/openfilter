# cloudbuild-cascade.yaml
#
# Cascades an openfilter release to all downstream filter images.
# Triggered on openfilter version tags (v*).
#
# Auto-discovers filter-* repos in the PlainsightAI org and for each:
#   1. Clone the repo
#   2. Skip if: no Dockerfile, no VERSION, own cloudbuild.yaml,
#      no openfilter dependency, or constraint incompatible
#   3. Detect build type from Dockerfile (filter_base vs standard)
#   4. Rebuild Docker image (which pulls new openfilter via pip)
#   5. Push based on repo visibility (GitHub API):
#      - Public repos:   DockerHub + GAR
#      - Internal repos:  GAR only
#
# Adding a new filter requires no changes here — just ensure the repo
# follows conventions: filter-* name, Dockerfile, VERSION, openfilter dep.
# DockerHub image name is derived as: openfilter-${repo#filter-}
#
# Repos with their own cloudbuild.yaml (e.g. filter-sam3-detector) are
# auto-skipped and triggered separately in Step 5.
# openfilter-mcp has no openfilter Python dependency (it indexes repos
# as data) and is triggered downstream to refresh its code search index.
#
# Dry-run by default: builds run without pushing or triggering downstream.
# The Terraform trigger sets _DRY_RUN=false for automated tag-triggered runs.
# Manual runs are safe out of the box:
#   gcloud builds triggers run openfilter-cascade \
#     --project=plainsightai-dev --region=global --branch=main
#
# FILTER-306: https://plainsight-ai.atlassian.net/browse/FILTER-306
# FILTER-314: https://plainsight-ai.atlassian.net/browse/FILTER-314

substitutions:
  _GAR_REGION: us-west1
  _GAR_PROJECT: plainsightai-prod
  _GAR_REPO: oci
  _DOCKERHUB_ORG: plainsightai
  _DRY_RUN: "true"
  _SINGLE_FILTER: ""

options:
  machineType: 'E2_HIGHCPU_8'
  diskSizeGb: 100
  logging: CLOUD_LOGGING_ONLY

timeout: 7200s

availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/dockerhub-username/versions/latest
      env: 'DOCKERHUB_USERNAME'
    - versionName: projects/${PROJECT_ID}/secrets/dockerhub-token/versions/latest
      env: 'DOCKERHUB_TOKEN'
    - versionName: projects/${PROJECT_ID}/secrets/github-token/versions/latest
      env: 'GITHUB_TOKEN'

steps:
  # ============================================================
  # Step 0: Setup - get openfilter version and configure auth
  # ============================================================
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'setup'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e

        # Get openfilter version from tag or VERSION file.
        # Tags and VERSION use v-prefix (v1.2.3); we strip it for
        # pip/Docker which expect bare semver (1.2.3).
        if [[ -n "${TAG_NAME}" ]]; then
          OF_VERSION=$(echo "${TAG_NAME}" | sed 's/^v//')
        else
          OF_VERSION=$(cat VERSION | tr -d '[:space:]' | sed 's/^v//')
        fi
        echo "OpenFilter version: $${OF_VERSION}"
        echo "$${OF_VERSION}" > /workspace/openfilter_version

        # Create workspace directories
        mkdir -p /workspace/filters
        mkdir -p /workspace/results

        # Copy constraint-check script to workspace (source is at /workspace/scripts/)
        cp /workspace/scripts/check_constraint.py /workspace/check_constraint.py

        echo "Setup complete"

  # ============================================================
  # Step 1: DockerHub login
  # ============================================================
  - name: 'gcr.io/cloud-builders/docker'
    id: 'dockerhub-login'
    waitFor: ['setup']
    entrypoint: 'bash'
    secretEnv: ['DOCKERHUB_USERNAME', 'DOCKERHUB_TOKEN']
    args:
      - '-c'
      - |
        echo "$${DOCKERHUB_TOKEN}" | docker login -u "$${DOCKERHUB_USERNAME}" --password-stdin
        echo "DockerHub login successful"

  # ============================================================
  # Step 2: Setup QEMU for multi-platform builds
  # ============================================================
  - name: 'gcr.io/cloud-builders/docker'
    id: 'qemu-setup'
    waitFor: ['setup']
    args: ['run', '--privileged', 'multiarch/qemu-user-static', '--reset', '-p', 'yes']

  # ============================================================
  # Step 3: Create buildx builder
  # ============================================================
  - name: 'gcr.io/cloud-builders/docker'
    id: 'buildx-setup'
    waitFor: ['qemu-setup']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker buildx create --name multiarch --driver docker-container --use || true
        docker buildx inspect --bootstrap

  # ============================================================
  # Step 4: Build and push filter images
  # Each filter is built in sequence to manage resources.
  # Each iteration runs in a subshell so one failure does not
  # abort the remaining filters.
  # ============================================================
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'build-filters'
    waitFor: ['dockerhub-login', 'buildx-setup']
    entrypoint: 'bash'
    secretEnv: ['GITHUB_TOKEN', 'DOCKERHUB_USERNAME', 'DOCKERHUB_TOKEN']
    env:
      - 'DRY_RUN=${_DRY_RUN}'
      - 'GAR_REGION=${_GAR_REGION}'
      - 'GAR_PROJECT=${_GAR_PROJECT}'
      - 'GAR_REPO=${_GAR_REPO}'
      - 'DOCKERHUB_ORG=${_DOCKERHUB_ORG}'
      - 'SINGLE_FILTER=${_SINGLE_FILTER}'
    args: ['/workspace/scripts/build-filters.sh']

  # ============================================================
  # Step 5: Trigger downstream Cloud Builds (for repos with own cloudbuild.yaml)
  # ============================================================
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'trigger-downstream'
    waitFor: ['build-filters']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        OF_VERSION=$(cat /workspace/openfilter_version)
        DRY_RUN="${_DRY_RUN}"

        if [[ "$${DRY_RUN}" == "true" ]]; then
          echo "DRY RUN - skipping downstream triggers"
          exit 0
        fi

        echo "Triggering downstream builds for openfilter $${OF_VERSION}"

        # Trigger filter-sam3-detector build
        # Note: This requires the trigger to be set up to accept substitutions
        # or to rebuild on the current HEAD of main
        # Note: trigger region matches GAR region by convention (both us-west1).
        echo "Triggering filter-sam3-detector..."
        gcloud builds triggers run filter-sam3-detector-tag \
          --region=${_GAR_REGION} \
          --branch=main \
          --substitutions=_OPENFILTER_VERSION=$${OF_VERSION} \
          || echo "WARNING: filter-sam3-detector trigger failed (see error above)"

        # Trigger openfilter-mcp build
        echo "Triggering openfilter-mcp..."
        gcloud builds triggers run openfilter-mcp-tag \
          --region=${_GAR_REGION} \
          --branch=main \
          --substitutions=_OPENFILTER_VERSION=$${OF_VERSION} \
          || echo "WARNING: openfilter-mcp trigger failed (see error above)"

        echo "Downstream triggers complete"
