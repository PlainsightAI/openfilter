# cloudbuild-cascade.yaml
#
# Cascades an openfilter release to all downstream filter images.
# Triggered on openfilter version tags (v*).
#
# Auto-discovers filter-* repos in the PlainsightAI org and for each:
#   1. Clone the repo
#   2. Skip if: no Dockerfile, no VERSION, own cloudbuild.yaml,
#      no openfilter dependency, or constraint incompatible
#   3. Detect build type from Dockerfile (filter_base vs standard)
#   4. Rebuild Docker image (which pulls new openfilter via pip)
#   5. Push based on repo visibility (GitHub API):
#      - Public repos:   DockerHub + GAR
#      - Internal repos:  GAR only
#
# Adding a new filter requires no changes here — just ensure the repo
# follows conventions: filter-* name, Dockerfile, VERSION, openfilter dep.
# DockerHub image name is derived as: openfilter-${repo#filter-}
#
# Repos with their own cloudbuild.yaml (e.g. filter-sam3-detector) are
# auto-skipped and triggered separately in Step 5.
# openfilter-mcp has no openfilter Python dependency (it indexes repos
# as data) and is triggered downstream to refresh its code search index.
#
# Dry-run by default: builds run without pushing or triggering downstream.
# The Terraform trigger sets _DRY_RUN=false for automated tag-triggered runs.
# Manual runs are safe out of the box:
#   gcloud builds triggers run openfilter-cascade \
#     --project=plainsightai-dev --region=global --branch=main
#
# FILTER-306: https://plainsight-ai.atlassian.net/browse/FILTER-306
# FILTER-314: https://plainsight-ai.atlassian.net/browse/FILTER-314

substitutions:
  _GAR_REGION: us-west1
  _GAR_PROJECT: plainsightai-prod
  _GAR_REPO: oci
  _DOCKERHUB_ORG: plainsightai
  _DRY_RUN: "true"

options:
  machineType: 'E2_HIGHCPU_8'
  diskSizeGb: 100
  logging: CLOUD_LOGGING_ONLY

timeout: 7200s

availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/dockerhub-username/versions/latest
      env: 'DOCKERHUB_USERNAME'
    - versionName: projects/${PROJECT_ID}/secrets/dockerhub-token/versions/latest
      env: 'DOCKERHUB_TOKEN'
    - versionName: projects/${PROJECT_ID}/secrets/github-token/versions/latest
      env: 'GITHUB_TOKEN'

steps:
  # ============================================================
  # Step 0: Setup - get openfilter version and configure auth
  # ============================================================
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'setup'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e

        # Get openfilter version from tag or VERSION file.
        # Tags and VERSION use v-prefix (v1.2.3); we strip it for
        # pip/Docker which expect bare semver (1.2.3).
        if [[ -n "${TAG_NAME}" ]]; then
          OF_VERSION=$(echo "${TAG_NAME}" | sed 's/^v//')
        else
          OF_VERSION=$(cat VERSION | tr -d '[:space:]' | sed 's/^v//')
        fi
        echo "OpenFilter version: $${OF_VERSION}"
        echo "$${OF_VERSION}" > /workspace/openfilter_version

        # Create workspace directories
        mkdir -p /workspace/filters
        mkdir -p /workspace/results

        # Write constraint-check helper script. Reads OF_VERSION from env,
        # outputs: none | ok:<spec> | skip:<spec> | error:<msg>
        printf '%s\n' 'import tomllib,re,sys,os' 'try:' '  with open("pyproject.toml","rb") as f: data=tomllib.load(f)' '  deps=list(data.get("project",{}).get("dependencies",[]))' '  for g in data.get("project",{}).get("optional-dependencies",{}).values(): deps.extend(g)' '  found=False; c=""' '  for d in deps:' '    if d.strip().startswith("openfilter"):' '      found=True' '      m=re.match(r"openfilter(?:\[[^\]]*\])?\s*(.*)",d.strip())' '      if m and m.group(1): c=m.group(1)' '      break' '  if not found: print("none"); sys.exit(0)' '  if not c: print("ok:"); sys.exit(0)' '  from packaging.specifiers import SpecifierSet' '  from packaging.version import Version' '  v_str=os.environ.get("OF_VERSION","")' '  if not v_str: print("error:OF_VERSION not set"); sys.exit(0)' '  s=SpecifierSet(c); v=Version(v_str)' '  print(("ok:" if v in s else "skip:")+str(c))' 'except Exception as e: print("error:"+str(e))' > /workspace/check_constraint.py

        echo "Setup complete"

  # ============================================================
  # Step 1: DockerHub login
  # ============================================================
  - name: 'gcr.io/cloud-builders/docker'
    id: 'dockerhub-login'
    waitFor: ['setup']
    entrypoint: 'bash'
    secretEnv: ['DOCKERHUB_USERNAME', 'DOCKERHUB_TOKEN']
    args:
      - '-c'
      - |
        echo "$${DOCKERHUB_TOKEN}" | docker login -u "$${DOCKERHUB_USERNAME}" --password-stdin
        echo "DockerHub login successful"

  # ============================================================
  # Step 2: Setup QEMU for multi-platform builds
  # ============================================================
  - name: 'gcr.io/cloud-builders/docker'
    id: 'qemu-setup'
    waitFor: ['setup']
    args: ['run', '--privileged', 'multiarch/qemu-user-static', '--reset', '-p', 'yes']

  # ============================================================
  # Step 3: Create buildx builder
  # ============================================================
  - name: 'gcr.io/cloud-builders/docker'
    id: 'buildx-setup'
    waitFor: ['qemu-setup']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker buildx create --name multiarch --driver docker-container --use || true
        docker buildx inspect --bootstrap

  # ============================================================
  # Step 4: Build and push filter images
  # Each filter is built in sequence to manage resources.
  # Each iteration runs in a subshell so one failure does not
  # abort the remaining filters.
  # ============================================================
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'build-filters'
    waitFor: ['dockerhub-login', 'buildx-setup']
    entrypoint: 'bash'
    secretEnv: ['GITHUB_TOKEN']
    args:
      - '-c'
      - |
        OF_VERSION=$(cat /workspace/openfilter_version)
        DRY_RUN="${_DRY_RUN}"
        if [[ "$${DRY_RUN}" == "true" ]]; then
          echo "============================================"
          echo "DRY RUN MODE - builds will NOT be pushed"
          echo "============================================"
        fi
        echo "Building filters for openfilter $${OF_VERSION}"

        # GAR auth must be configured in this step; Docker credentials
        # from prior steps are not persisted across Cloud Build containers.
        gcloud auth print-access-token | docker login -u oauth2accesstoken --password-stdin https://${_GAR_REGION}-docker.pkg.dev

        # Recreate buildx builder (builder state in ~/.docker/buildx/ is not
        # shared across Cloud Build step containers, only the Docker daemon is)
        docker buildx create --name multiarch --driver docker-container --use || true
        docker buildx inspect --bootstrap

        # Configure git credential helper scoped to github.com only
        git config --global credential.https://github.com.helper '!f() { echo "username=x-access-token"; echo "password=$${GITHUB_TOKEN}"; }; f'

        # Validate Python 3.11+ (required for tomllib) and install packaging
        python3 -c "import tomllib" 2>/dev/null || {
          echo "ERROR: Python 3.11+ required for tomllib (constraint checking)"
          python3 --version
          exit 1
        }
        python3 -m pip install --quiet packaging

        # Fetch repo visibility from GitHub API (one paginated call for all
        # filter-* repos). Builds a lookup file: "repo_name visibility" per line.
        # Retries up to 3 times; fails the build if it never succeeds.
        VISIBILITY_FILE=/workspace/results/repo_visibility.txt
        for ATTEMPT in 1 2 3; do
          echo "Fetching repo visibility from GitHub API (attempt $${ATTEMPT}/3)..."
          NEXT_URL="https://api.github.com/orgs/PlainsightAI/repos?per_page=100"
          > "$${VISIBILITY_FILE}"
          FETCH_OK=true
          while [[ -n "$${NEXT_URL}" ]]; do
            RESPONSE=$(curl -sf --http1.1 \
              -H "Authorization: token $${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -D /tmp/gh_headers \
              "$${NEXT_URL}") || { FETCH_OK=false; break; }
            echo "$${RESPONSE}" | python3 -c "import json,sys; [print(r['name'],r.get('visibility','internal')) for r in json.load(sys.stdin)]" >> "$${VISIBILITY_FILE}" || { FETCH_OK=false; break; }
            # Follow pagination Link header
            NEXT_URL=$(grep -oi '<[^>]*>; rel="next"' /tmp/gh_headers | sed 's/<\(.*\)>; rel="next"/\1/' || true)
          done
          if [[ "$${FETCH_OK}" == "true" ]] && [[ -s "$${VISIBILITY_FILE}" ]]; then
            echo "Fetched visibility for $(wc -l < "$${VISIBILITY_FILE}") repos"
            break
          fi
          echo "WARNING: GitHub API fetch failed (attempt $${ATTEMPT})"
          sleep 5
        done
        if [[ ! -s "$${VISIBILITY_FILE}" ]]; then
          echo "ERROR: Failed to fetch repo visibility after 3 attempts"
          exit 1
        fi

        # Auto-discover filter-* repos from the visibility API response.
        # DockerHub image name: openfilter-${repo#filter-} (enforced convention).
        # Build type is detected from repo contents after cloning.
        # Visibility is looked up from the API response above.
        #
        # Sparse exclude list for repos that should never be rebuilt here:
        #   -old suffix  - superseded by newer version
        #   -template    - cookiecutter templates, not buildable
        FILTER_REPOS=$(awk '{print $1}' "$${VISIBILITY_FILE}" | grep '^filter-' | sort)

        for REPO in $${FILTER_REPOS}; do
          # Sparse exclude list: suffix-anchored or exact matches only
          SKIP_REPO=false
          case "$${REPO}" in
            *-old) SKIP_REPO=true ;;
            filter-template) SKIP_REPO=true ;;
          esac
          if [[ "$${SKIP_REPO}" == "true" ]]; then
            echo "Excluding $${REPO} (matches exclude pattern)"
            continue
          fi

          IMAGE="openfilter-$${REPO#filter-}"
          VISIBILITY=$(grep "^$${REPO} " "$${VISIBILITY_FILE}" | awk '{print $2}')
          VISIBILITY=$${VISIBILITY:-internal}

          echo ""
          echo "============================================"
          echo "Processing: $${REPO}"
          echo "============================================"

          # Run each filter build in a subshell for error isolation.
          (
            set -euo pipefail

            # Clone the filter repo (token provided via credential helper, not in URL)
            cd /workspace/filters
            if [[ -d "$${REPO}" ]]; then
              rm -rf "$${REPO}"
            fi

            git clone --depth 1 "https://github.com/PlainsightAI/$${REPO}.git" "$${REPO}"
            cd "$${REPO}"

            # --- Auto-detect: skip repos with their own Cloud Build pipeline ---
            if [[ -f cloudbuild.yaml ]]; then
              echo "Skipping $${REPO} - has own cloudbuild.yaml"
              echo "$${REPO}: SKIPPED (own cloudbuild)" >> /workspace/results/summary.txt
              touch "/workspace/results/.skip_$${REPO}"
              exit 0
            fi

            # --- Auto-detect: skip repos without a Dockerfile ---
            if [[ ! -f Dockerfile ]]; then
              echo "Skipping $${REPO} - no Dockerfile"
              echo "$${REPO}: SKIPPED (no Dockerfile)" >> /workspace/results/summary.txt
              touch "/workspace/results/.skip_$${REPO}"
              exit 0
            fi

            # --- Auto-detect: skip repos without a version ---
            FILTER_VERSION=""
            if [[ -f VERSION ]]; then
              FILTER_VERSION=$(tr -d '[:space:]' < VERSION | sed 's/^v//')
            fi
            if [[ -z "$${FILTER_VERSION}" ]]; then
              echo "Skipping $${REPO} - no VERSION file"
              echo "$${REPO}: SKIPPED (no VERSION)" >> /workspace/results/summary.txt
              touch "/workspace/results/.skip_$${REPO}"
              exit 0
            fi
            echo "Filter version: $${FILTER_VERSION}"

            # --- Constraint check: skip repos without openfilter dep or incompatible ---
            export OF_VERSION
            COMPAT_RESULT=$(python3 /workspace/check_constraint.py 2>/dev/null || echo "error:python-failed")
            echo "Constraint check: $${COMPAT_RESULT}"

            if [[ "$${COMPAT_RESULT}" == "none" ]]; then
              echo "Skipping $${REPO} - no openfilter dependency"
              echo "$${REPO}: SKIPPED (no openfilter dep)" >> /workspace/results/summary.txt
              touch "/workspace/results/.skip_$${REPO}"
              exit 0
            elif [[ "$${COMPAT_RESULT}" == error:* ]]; then
              ERROR_MSG=$${COMPAT_RESULT#error:}
              echo "ERROR: Constraint check failed for $${REPO}: $${ERROR_MSG}"
              echo "$${REPO}: FAILED (constraint check error: $${ERROR_MSG})" >> /workspace/results/summary.txt
              exit 1
            elif [[ "$${COMPAT_RESULT}" == skip:* ]]; then
              CONSTRAINT=$${COMPAT_RESULT#skip:}
              echo "Constraint $${CONSTRAINT} does not allow $${OF_VERSION}, skipping"
              echo "$${REPO}: SKIPPED (constraint: $${CONSTRAINT})" >> /workspace/results/summary.txt
              touch "/workspace/results/.skip_$${REPO}"
              exit 0
            fi

            # --- Auto-detect build type from Dockerfile ---
            # filter_base: Dockerfile references the filter_base GAR image
            # standard: everything else
            BUILD_TYPE="standard"
            if grep -q 'filter_base' Dockerfile 2>/dev/null; then
              BUILD_TYPE="filter_base"
            fi
            echo "Build type: $${BUILD_TYPE}"

            # Determine push targets based on GitHub API visibility lookup
            GAR_IMAGE="${_GAR_REGION}-docker.pkg.dev/${_GAR_PROJECT}/${_GAR_REPO}/$${REPO}"
            DOCKERHUB_IMAGE="${_DOCKERHUB_ORG}/$${IMAGE}"

            TAGS="-t $${GAR_IMAGE}:$${FILTER_VERSION} -t $${GAR_IMAGE}:latest"
            TAGS="$${TAGS} -t $${GAR_IMAGE}:$${FILTER_VERSION}-of$${OF_VERSION}"
            if [[ "$${VISIBILITY}" == "public" ]]; then
              echo "Public repo - pushing to DockerHub + GAR"
              TAGS="$${TAGS} -t $${DOCKERHUB_IMAGE}:$${FILTER_VERSION} -t $${DOCKERHUB_IMAGE}:latest"
            else
              echo "Internal repo - pushing to GAR only"
            fi

            echo "Building $${REPO}:$${FILTER_VERSION}"

            # Build args based on detected type
            BUILD_ARGS=""
            if [[ "$${BUILD_TYPE}" == "filter_base" ]]; then
              RBV=$(cat RESOURCE_BUNDLE_VERSION 2>/dev/null | tr -d '[:space:]' || echo "latest")
              BUILD_ARGS="--build-arg RESOURCE_BUNDLE_VERSION=$${RBV}"
            fi

            # Refresh GAR auth before build (tokens expire after 1 hour)
            gcloud auth print-access-token | docker login -u oauth2accesstoken --password-stdin https://${_GAR_REGION}-docker.pkg.dev

            # Build (and push unless dry-run) with registry-based cache
            PUSH_FLAG="--push"
            CACHE_TO="--cache-to type=registry,ref=$${GAR_IMAGE}:buildcache"
            if [[ "$${DRY_RUN}" == "true" ]]; then
              PUSH_FLAG=""
              CACHE_TO=""
            fi
            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              --cache-from type=registry,ref=$${GAR_IMAGE}:buildcache \
              $${CACHE_TO} \
              $${BUILD_ARGS} \
              $${TAGS} \
              $${PUSH_FLAG} \
              .

            if [[ "$${DRY_RUN}" == "true" ]]; then
              echo "$${REPO}: SUCCESS/DRY-RUN ($${FILTER_VERSION})" >> /workspace/results/summary.txt
              echo "Dry-run build succeeded for $${REPO}:$${FILTER_VERSION} (not pushed)"
            else
              echo "$${REPO}: SUCCESS ($${FILTER_VERSION})" >> /workspace/results/summary.txt
              echo "Successfully built and pushed $${REPO}:$${FILTER_VERSION}"
            fi
          )
          EXIT_CODE=$?
          if [[ -f "/workspace/results/.skip_$${REPO}" ]]; then
            # Skip was requested (constraint mismatch or missing VERSION)
            rm -f "/workspace/results/.skip_$${REPO}"
            continue
          elif [[ $EXIT_CODE -ne 0 ]]; then
            # Only write if subshell didn't already record a result
            if ! grep -q "^$${REPO}:" /workspace/results/summary.txt 2>/dev/null; then
              echo "$${REPO}: FAILED (see error above)" >> /workspace/results/summary.txt || echo "WARNING: Could not write summary for $${REPO}" >&2
            fi
          fi
        done

        echo ""
        echo "============================================"
        echo "Build Summary"
        echo "============================================"
        cat /workspace/results/summary.txt 2>/dev/null || echo "No results recorded"

        # Fail the step if any filter builds failed
        FAIL_COUNT=$(grep -c ': FAILED' /workspace/results/summary.txt 2>/dev/null || echo 0)
        SUCCESS_COUNT=$(grep -c ': SUCCESS' /workspace/results/summary.txt 2>/dev/null || echo 0)
        if [[ "$${DRY_RUN}" == "true" ]]; then
          echo "DRY RUN complete: $${SUCCESS_COUNT} built (not pushed), $${FAIL_COUNT} failed"
        else
          echo "Results: $${SUCCESS_COUNT} succeeded, $${FAIL_COUNT} failed"
        fi
        if [[ "$${FAIL_COUNT}" -gt 0 ]]; then
          echo "ERROR: $${FAIL_COUNT} filter(s) failed to build"
          exit 1
        fi

  # ============================================================
  # Step 5: Trigger downstream Cloud Builds (for repos with own cloudbuild.yaml)
  # ============================================================
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'trigger-downstream'
    waitFor: ['build-filters']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        OF_VERSION=$(cat /workspace/openfilter_version)
        DRY_RUN="${_DRY_RUN}"

        if [[ "$${DRY_RUN}" == "true" ]]; then
          echo "DRY RUN - skipping downstream triggers"
          exit 0
        fi

        echo "Triggering downstream builds for openfilter $${OF_VERSION}"

        # Trigger filter-sam3-detector build
        # Note: This requires the trigger to be set up to accept substitutions
        # or to rebuild on the current HEAD of main
        echo "Triggering filter-sam3-detector..."
        gcloud builds triggers run filter-sam3-detector-tag \
          --region=${_GAR_REGION} \
          --branch=main \
          --substitutions=_OPENFILTER_VERSION=$${OF_VERSION} \
          || echo "WARNING: filter-sam3-detector trigger failed (see error above)"

        # Trigger openfilter-mcp build
        echo "Triggering openfilter-mcp..."
        gcloud builds triggers run openfilter-mcp-tag \
          --region=${_GAR_REGION} \
          --branch=main \
          --substitutions=_OPENFILTER_VERSION=$${OF_VERSION} \
          || echo "WARNING: openfilter-mcp trigger failed (see error above)"

        echo "Downstream triggers complete"
