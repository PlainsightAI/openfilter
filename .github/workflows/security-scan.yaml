name: Security Scan
on:
  push:
    branches: [main, release]
  pull_request:
    branches: [main, release]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'  # Weekly

jobs:
  security-scan:
    uses: PlainsightAI/gh-actions-public/.github/workflows/security-scan.yaml@main
    with:
      filter_name: openfilter
