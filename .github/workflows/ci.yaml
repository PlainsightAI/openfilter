name: CI

on:
  push:
    branches: [main, release]
  pull_request:
    branches: [main, release]
  workflow_dispatch:

env:
  DO_NOT_TRACK: true

jobs:
  run-unit-tests:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Install project and dependencies
        run: make install

      - name: Run tests
        run: make test-all

  # Path-filtered checks for the tag-cascade scripts on PRs touching
  # scripts/cascade/** or the cascade workflow: shellcheck + actionlint +
  # a single-filter discover.sh smoke against filter-frame-selector. The
  # smoke step succeeds with zero eligible consumers (the consumer's
  # constraint can exclude the in-tree VERSION); only script errors fail.
  cascade-pr-checks:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Detect cascade-affecting changes
        id: filter
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # Fetch base for diff. checkout@v6 only fetches HEAD by default.
          git fetch --no-tags --depth=1 origin "${BASE_SHA}" 2>/dev/null || true
          if git diff --name-only "${BASE_SHA}" "${HEAD_SHA}" \
              | grep -E '^(scripts/cascade/|\.github/workflows/cascade-on-tag\.yaml$)' > /dev/null; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "No cascade-related changes; skipping smoke." >&2
          fi

      - name: Set up Python
        if: steps.filter.outputs.run == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install constraint-check deps
        if: steps.filter.outputs.run == 'true'
        run: pip install --quiet packaging

      - name: shellcheck cascade scripts
        if: steps.filter.outputs.run == 'true'
        uses: ludeeus/action-shellcheck@2.0.0
        env:
          SHELLCHECK_OPTS: -e SC2317
        with:
          scandir: scripts/cascade
          severity: warning

      - name: actionlint cascade workflow
        if: steps.filter.outputs.run == 'true'
        uses: raven-actions/actionlint@v2
        with:
          files: .github/workflows/cascade-on-tag.yaml

      - name: Discover smoke (single filter)
        if: steps.filter.outputs.run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OF_VERSION: 0.0.0-smoke
          SINGLE_FILTER: filter-frame-selector
        run: |
          set -euo pipefail
          # Discovery may emit zero eligible consumers when the in-tree
          # OF_VERSION is outside the consumer's declared range; that is a
          # PASS (the script's own diagnostic exited cleanly). Hard-fail
          # only on script errors (non-zero exit).
          ./scripts/cascade/discover.sh > /tmp/consumers.txt || {
            rc=$?
            echo "::error::discover.sh exited ${rc}" >&2
            exit "${rc}"
          }
          echo "---- discover.sh smoke output ----"
          cat /tmp/consumers.txt || true
